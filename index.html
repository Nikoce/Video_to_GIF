<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>视频转 GIF</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>视频转 GIF</h1>
            <p>本地浏览器处理，素材不会上传服务器。</p>
          </div>
          <button id="resetButton" class="icon-button" type="button" title="重置">
            <span aria-hidden="true">↺</span>
            <span class="sr-only">重置</span>
          </button>
        </header>

        <section id="dropZone" class="drop-zone">
          <input id="fileInput" type="file" accept="video/mp4,video/quicktime,video/webm,video/x-m4v,.mp4,.mov,.webm,.m4v" multiple />
          <div class="drop-copy">
            <strong>拖入视频</strong>
            <span>支持 MP4、MOV、WEBM、M4V；默认整段转 GIF，也可以截取 3-8 秒片段。</span>
          </div>
          <button id="chooseButton" class="primary-button" type="button">选择视频</button>
        </section>

        <section class="media-grid">
          <div class="preview-panel">
            <div class="panel-header">
              <h2>当前视频预览</h2>
              <span id="sourceMeta" class="status-pill">未选择</span>
            </div>
            <video id="videoPreview" controls playsinline muted></video>
          </div>

          <div class="preview-panel">
            <div class="panel-header">
              <h2>GIF 结果</h2>
              <span id="resultMeta" class="status-pill">等待生成</span>
            </div>
            <div id="resultStage" class="result-stage">
              <span>生成后在这里预览</span>
              <img id="gifPreview" alt="GIF 预览" hidden />
            </div>
          </div>
        </section>

        <section id="batchPanel" class="batch-panel hidden">
          <div class="panel-header">
            <div>
              <h2>已选视频预览</h2>
              <p id="batchSummary">所有待生成视频都会显示在这里。</p>
            </div>
            <button id="removeAllButton" class="secondary-button compact-button" type="button">清空全部</button>
          </div>
          <div class="batch-toolbar">
            <span id="selectionSummary">未选择视频</span>
            <div class="batch-actions">
              <button id="selectAllButton" class="secondary-button compact-button" type="button">全选</button>
              <button id="clearSelectionButton" class="secondary-button compact-button" type="button">取消选择</button>
              <button id="applyClipButton" class="secondary-button compact-button" type="button">应用当前设置到选中</button>
            </div>
          </div>
          <div id="videoGrid" class="video-preview-grid"></div>
        </section>

        <section class="control-panel">
          <div class="panel-header">
            <h2>转换设置</h2>
            <span id="statusText" class="status-text">请选择一个视频。</span>
          </div>

          <div id="clipSelection" class="clip-panel" style="--clip-start-pct: 0%; --clip-end-pct: 0%;">
            <div class="clip-header">
              <div>
                <h3>片段截选</h3>
                <span id="clipDurationLabel">选择视频后默认整段转 GIF</span>
              </div>
              <label class="clip-toggle">
                <input id="clipToggle" type="checkbox" />
                <span>截取片段</span>
              </label>
              <span id="clipCurrentTime" class="status-pill">0:00</span>
            </div>
            <div class="clip-timeline">
              <div class="clip-track">
                <div class="clip-fill"></div>
              </div>
              <label class="clip-range-label">
                <span>开始点</span>
                <input id="clipStartRange" type="range" min="0" max="0" step="0.1" value="0" disabled />
              </label>
              <label class="clip-range-label">
                <span>结束点</span>
                <input id="clipEndRange" type="range" min="0" max="0" step="0.1" value="0" disabled />
              </label>
            </div>
            <div class="clip-actions">
              <button id="markStartButton" class="secondary-button compact-button" type="button" disabled>当前画面设为开始</button>
              <button id="markEndButton" class="secondary-button compact-button" type="button" disabled>当前画面设为结束</button>
              <button id="previewClipButton" class="secondary-button compact-button" type="button" disabled>预览截选片段</button>
            </div>
          </div>

          <div class="form-grid">
            <label>
              <span>开始时间</span>
              <input id="startInput" type="number" min="0" step="0.1" value="0" />
            </label>
            <label>
              <span>结束时间</span>
              <input id="endInput" type="number" min="0" step="0.1" value="3" />
            </label>
            <label>
              <span>帧率 FPS</span>
              <input id="fpsInput" type="number" min="4" max="18" step="1" value="10" />
            </label>
            <label>
              <span>画面宽度 px</span>
              <input id="widthInput" type="number" min="160" max="960" step="20" value="480" />
            </label>
          </div>

          <div class="compression-panel">
            <div class="compression-header">
              <div>
                <h3>压缩设置</h3>
                <span id="compressionHint">均衡清晰，适合日常查看。</span>
              </div>
              <label>
                <span>当前方案</span>
                <select id="compressionMode">
                  <option value="review-min">复盘极小（1 MB / 360px / 8fps / 96色）</option>
                  <option value="standard" selected>均衡清晰（8 MB / 720px / 12fps / 192色）</option>
                  <option value="clear">清晰优先（5 MB / 540px / 12fps / 160色）</option>
                  <option value="custom">自定义参数</option>
                </select>
              </label>
            </div>
            <div class="compression-grid">
              <label>
                <span>目标大小 MB</span>
                <input id="targetMbInput" type="number" min="0.2" max="20" step="0.1" value="8" />
              </label>
              <label>
                <span>颜色数量</span>
                <input id="colorsInput" type="number" min="32" max="256" step="8" value="192" />
              </label>
            </div>
          </div>

          <div class="action-row">
            <button id="convertButton" class="primary-button" type="button" disabled>全部生成 GIF</button>
            <a id="downloadLink" class="secondary-button disabled" download="video-to-gif.gif">下载当前 GIF</a>
          </div>

          <div class="progress-wrap" aria-live="polite">
            <div class="progress-track">
              <div id="progressBar" class="progress-bar"></div>
            </div>
            <span id="progressLabel">0%</span>
          </div>
        </section>

        <section class="task-panel">
          <div class="panel-header">
            <div>
              <h2>GIF 任务</h2>
              <p id="taskSummary">还没有任务。选择视频后即可生成。</p>
            </div>
          </div>
          <div id="taskBody" class="task-body empty">暂无任务</div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
